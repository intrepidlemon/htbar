---
pandharipande:
  sid: pandharipande
  name: Pari V. Pandharipande, M.D., M.P.H.
  img: img/pandharipande.jpg
  bio: |
    Pari V. Pandharipande, M.D., M.P.H. is the Eugene P. Pendergrass Professor and Chair of Radiology at the University of Pennsylvania. Dr. Pandharipande is a graduate of Cornell University, Weill Cornell University Medical College, and the Harvard School of Public Health. She completed her residency in diagnostic radiology at NYU, and an NCI-sponsored fellowship in cancer outcomes research and abdominal imaging at MGH. After fellowship, she spent 15 years at MGH as an abdominal radiologist and physician scientist. During this time, she directed a multidisciplinary research institute centered in health outcomes and led an enterprise-wide initiative involving the clinical integration of imaging services across MGH, Brigham & Women’s Hospital, and their community affiliates. In 2021, she joined The Ohio State University as the Chair of Radiology, serving during a period of substantial growth in the Department’s infrastructure, service lines and volumes, and training program. In 2025, she joined the University of Pennsylvania, serving as its ninth Chair of Radiology. Dr. Pandharipande continues to lead an NIH-funded research program centered in in decision science, imaging, and cancer care. She serves as a standing member of the NIH Organization and Delivery of Health Services (ODHS) study section, and as an advisory panel member for the American College of Radiology Harvey L. Neiman Health Policy Institute. She recently completed service as an at-large member of the RSNA Board of Directors, and she is a fellow of the American College of Radiology. Her career goal is to ensure that every patient’s encounter with imaging adds value to their care.

nazarian:
  sid: nazarian
  name: Levon N. Nazarian, MD
  img: img/nazarian.png
  bio: |
    Levon N. Nazarian, MD, FAIUM, FACR has co-authored more than 100 peer-reviewed manuscripts and more than 100 abstracts on topics including the use of ultrasound to diagnose and guide innovative treatments for a wide range of musculoskeletal conditions. From 2011-2018 he was Editor-in-Chief of the Journal of Ultrasound in Medicine. He currently serves on the editorial boards of Radiology and the European Journal of Radiology.  In January 2023, Dr. Nazarian joined the faculty at Penn Medicine where he is Professor of Radiology, Professor of Radiology in Orthopaedic Surgery, and Chief of the Division of Musculoskeletal Radiology.

siegelman:
  sid: siegelman
  name: Evan S. Siegelman, MD
  img: img/siegelman.jpg
  bio: |
    Evan Siegelman, MD, is professor of Radiology in the Abdominal Imaging Division at Penn Medicine. He has chaired the Resident Selection Committee since 2002. He has won the Wallace T. Miller Sr. Teaching Award more than any single faculty member in the history of Diagnostic Radiology at Penn.  He is the "Jedi Master" of teaching the principles and practice of Body MR. He has published an early definitive textbook on Body MR and has lectured regionally, nationally and internationally on applications of Body MR. He is currently a member of the ORADS (ovarian reporting and data system) Committee and a former member of the LI-RADS working group.

noor:
  sid: noor
  name: Abass Noor, MD
  img: img/noor.png
  bio: |
    Dr. Noor is an attending physician in the Departments of Radiology at the University of Pennsylvania and Children's Hospital of Philadelphia. He completed his undergraduate education at Macalester College (St. Paul, MN) and received his medical degree from the Alpert Medical School of Brown University (Providence, RI). Given his experiences as a refugee from Somalia, Dr. Noor has long held a passion for working toward a more equitable future for low and middle-income countries (LMICs). His current interests are primarily in medical education and in implementing sustainable radiology services in resource-limited areas of the world. Dr. Noor is the Director of Global Radiology Outreach & Education at the Children's Hospital of Philadelphia and the Director of the Health Equity Leadership Track in the radiology residency program of the University of Pennsylvania. He also serves as the Program Manager for RAD-AID Botswana, an international organization seeking to increase and improve radiology in LMICs.

simpson:
  sid: simpson
  name: Scott Simpson, DO, MS, MSEd
  img: img/simpson.jpg
  bio: |
    Dr. Simpson graduated from Penn's cardiothoracic imaging fellowship in 2014, spent 3 years at Temple University Hospital and then returned to Penn in 2017. Since he has returned to Penn his leadership efforts have mostly on education. He serves as the APD for the radiology residency, Director of Radiology Medical Student Education for PSOM, and Co-Founder and Director of the Penn Radiology TEACH track. Dr. Simpson recently completed a Masters in Medical Education at Penn's GSE. He is married to Michelle Hershman and is the father of two boys!

trerotola:
  sid: trerotola
  name: Scott O. Trerotola, MD
  img: img/trerotola.jpg
  bio: |
    Scott O. Trerotola, MD, FACR, FSIR, is the Stanley Baum professor of radiology and professor of surgery at the University of Pennsylvania School of Medicine in Philadelphia, where he is also Associate Chair and Chief of Interventional Radiology as well as Vice Chair for Quality and Safety. Dr. Trerotola pursues research in hemodialysis and venous access, IVC filters and PAVM embolotherapy, among other topics. He holds eight patents on devices for interventional procedures. Dr Trerotola was an original member of the original Dialysis Outcomes Quality Initiative clinical practice guidelines for vascular access, a document which has shaped hemodialysis access care for a generation. He has developed multiple techniques in widespread use in IR including balloon-assisted placement of large bore gastrostomy, ultra-high pressure angioplasty, forceps removal of inferior vena caval filters, and backbleeding treatment for arterial emboli during dialysis declotting. Dr Trerotola has served on over 10 SIR committees and was a member of the SIR Executive Council from 1998-2004 and served as Annual Meeting Chair for the 2001 SIR Annual Meeting. He chaired the SIR Educational Materials Committee and was editor of three SIR Syllabi during that tenure. He has served on the editorial board of every major radiology journal and continues to be an active reviewer for multiple radiology and nephrology journals. He has served as IR Scientific Program Chair for the RSNA Annual Meeting and has chaired the ACR. Dr Trerotola has received awards for teaching, distinction in reviewing and for patient advocacy. He regularly appears on Best Doctors in America and Best Doctors in Philadelphia lists. In 2010, he received the Louis Duhring Outstanding Clinical Specialist Award from his institution. He has given invited lectures worldwide, including the 2016 Society of Interventional Radiology Dotter Lecture and the inaugural Man-Chung Han lecture to the Korean Society of Cardiovascular and Interventional Radiology Society.

scanlon:
  sid: scanlon
  name: Mary Scanlon, MD, FACR
  img: img/scanlon.png
  bio: |
    Mary Helene Scanlon, MD FACR, is a Clinical Professor of Radiology at Penn Medicine and the Vice Chair of Education. She divides her clinical practice between the Division of Neuroradiology at Penn Medicine and the Department of Radiology of the Philadelphia Veterans Affairs Medical Center. Her subspecialty within Neuroradiology is Head and Neck. She has been the program director for Diagnostic Radiology since 2006, the same year she won the Wallace T. Miller Sr. Teaching Award. Dr. Scanlon's research interests center on radiology education and new ways to reach Gen Z and Millennials. She is passionate about organizational and political activism:
    • She is the past president of the Philadelphia Roentgen Ray Society and Pennsylvania Radiological Society. She was the honored radiologist by both societies.
    • She has served as faculty liaison to the PRS- RFS, and MSS sections since 2015.
    • She is Past President of APDR (Association of Program Directors in Radiology) and APDR Councilor to ACR. She recently chaired a national task force on how to ensure that resident training meets the procedural needs of the populations we serve. The voice of the TF was influential in recent changes made by ABR and ACGME in terms of both testing and tracking procedures expected of a general radiologist
    • She is currently a board member and Treasurer for ACR’s RadPac.
    • She was named 2020 ACR Advocate of the Year.
    • In 2015 a yearly RadPac Achievement award was named in her honor
    • She received the 2026 APDR Achievement Award at the AAR meeting in Atlanta

_rofsky:
  sid: _rofsky
  name: Neil M. Rofsky, MD, MHA
  img: img/rofsky.jpg
  bio: |
    Neil M. Rofsky, MD, MHA is Professor and System Chair of Radiology at the Icahn School of Medicine at Mount Sinai. A nationally and internationally recognized leader in body MRI, prostate imaging, and academic radiology leadership, he has held faculty appointments at NYU, Harvard Medical School, and UT Southwestern, where he served for over a decade as Chair of Radiology. His work has shaped modern body MRI sequences, MR angiography, high-field body imaging, and prostate cancer imaging, earning numerous honors including Gold Medals, distinguished lectureships, and NIH leadership roles. He is also widely recognized for his contributions to mentoring, organizational strategy, and leadership development, informed by formal training in healthcare administration and executive coaching. He brings a practical, experience-based perspective to career development and academic medicine.

edmonds:
  sid: edmonds
  name: Christine Edmonds, MD
  img: img/edmonds.png
  bio: |
    Christine Edmonds, MD is an Assistant Professor of Radiology at Penn and one of our fabulous breast radiologists. When not zooming around the reading room moving effortlessly from biopsy to screener to diag, she is crushing it in the research world with projects spanning from racial disparities in breast cancer to molecular imaging. She is also a Mom of two!

tischfield:
  sid: tischfield
  name: David Tischfield, MD, PhD
  img: img/tischfield.jpg
  bio: |
    David spent the majority of his childhood in Indiana and New Jersey. After high school, he attended Harvard College to earn a bachelor's degree in neuroscience. He then entered UPenn's MD/PhD program, followed by a preliminary medicine year at Pennsylvania Hospital before commencing his diagnostic radiology residency at UPenn. David graduated from the research track, conducting the majority of his research within the PIGI lab. There, he contributed to the development of PDX models of HCC and characterized immune responses to TACE in HCC. Currently a nuclear radiology fellow at UPenn, David is using functional metabolic imaging to better understand metabolic vulnerabilities in HCC and enhance diagnostic imaging paradigms. He is set to join the UPenn faculty in the CE track beginning in July. Outside of work, David is an avid snowboarder, hiker, and world traveler, though he spends most of his time watching TV on the couch with his wife, Jill, son, Nathan, and cat, Kitty Monster.

harrison:
  sid: harrison
  name: Neil Harrison, MD
  img: img/harrison.jpg
  bio: |
    Neil Harrison, MD received his medical degree from the Perelman School of Medicine at the University of Pennsylvania. He stayed at the University of Pennsylvania for training in Diagnostic Radiology before eventually transitioning in to one of the first positions for the new integrated Interventional Radiology/Diagnostic Radiology track. He graduated from residency in 2020 and took a job at Albany Med for one year before deciding to return to University of Pennsylvania to work as an attending Interventional Radiologist and Assistant Professor of Clinical Radiology at Pennsylvania Hospital.

reid:
  sid: reid
  name: Janet R. Reid, MD, FRCPC, MSEd
  img: img/reid.jpg
  bio: |
    Janet R. Reid, MD, FRCPC, MSEd, is an attending physician and Vice Chair of Education in the Department of Radiology at Children's Hospital of Philadelphia. She holds the Patricia Borns Endowed Chair in Radiology Education. She is a Professor of Radiology, University of Pennsylvania, Perelman School of Medicine. She runs an active Education Innovation team in CHOP Radiology studying the best ways to personalize learning and educate the next generation of radiologists.

obrien:
  sid: obrien
  name: Sophie O'Brien, MD
  img: img/obrien.png
  bio: |
    Sophia R. O'Brien, MD is an Assistant Professor of Clinical Radiology in the Penn Nuclear Medicine and Breast Imaging Divisions.  She is passionate about medical education, specifically radiology residency education, and is currently pursuing her Masters of Medical Education at Penn.  She is a co-founder and co-faculty leader of TEACH, the Director of Resident Education in the Nuclear Medicine division, and an Associate Program Director.  She is also co-founder and one of the faculty leaders of the Penn Women in Radiology group.  Besides medical education, her clinical and research interests include radionuclide therapy, F18-Fluoroestradiol imaging, clinical trials, mentorship, and women in medicine.

zafar:
  sid: zafar
  name: Hanna Zafar, MD, MHS
  img: img/zafar.jpg
  bio: |
    Hanna M. Zafar, MD, MHS, received her BA in Biological Basis of Behavior at the University of Pennsylvania in 1995, her MHS with a concentration in Health Policy from the Johns Hopkins School of Hygiene and Public Health in 1998, and her MD from Jefferson Medical College in 2002. After completing her radiology residency and Abdominal Imaging fellowship from the Hospital of the University of Pennsylvania in 2008 she joined the faculty in the Department of Radiology at the Perelman School of Medicine, where she is now an Associate Professor. Her research focus is in identification of gaps at the intersection of clinical medicine and radiology care systems and the design of novel interventions that positively impact the practice of evidence-based radiology. She has published on optimizing the reporting, management, and outcomes of non- emergent actionable imaging findings, evidence based clinical decision support at the time of image order entry, and comparative effectiveness in cancer imaging.

simmons:
  sid: simmons
  name: Shaquanna Simmons M.S., R.T., MR
  img: img/simmons.jpg
  bio: |
    Shaquanna Simmons M.S., R.T., MR is the Coordinator of Quality and Patient Safety for HUP Radiology. She has almost 16 years of working experience in Radiology, with many years of practical experience in pediatric and adult imaging in critical care and outpatient environments, in both diagnostic imaging and MRI. She has been an employee in the Penn Medicine Health System coming up on 12 years. She started her career at HUP as an MRI Technologist after the successful completion of the now defunct MRI Internship Program. She transitioned to her current role in 2019 after completing a master’s degree in Organization Development and Leadership as she wanted to be an effective leader in radiology with emphasis on patient care. Working in quality has provided her with that experience. She likes to remember, the patient is the number one priority in healthcare, and even though she no longer provides direct patient care, her role allows her to focus on patient safety while making improvements ensuring that patients have a positive experience in Penn Radiology's care. She manages the radiology quality improvement system called QUIQ-Rad, which is a low-level event reporting system specific to radiology. She is also responsible for auditing and tracking the reporting of critical values/results to ensure they are communicated accurately and timely. She works closely with Dr. Scott Trerotola, Dr. Hanna Zafar, and Andrea Pogozelski, in a supporting role for many Radiology Quality and Patient Safety initiatives.

chahine:
  sid: chahine
  name: Chantal Issam Chahine, MD
  img: img/chahine.png
  bio: |
    Chantal Issam Chahine, MD, is an Assistant Professor of Radiology specializing in musculoskeletal imaging. She completed her diagnostic radiology residency, an embedded musculoskeletal radiology fellowship, and an informatics fellowship at the University of Pennsylvania. She is RMSK certified, with clinical and research interests centered on musculoskeletal ultrasound, including diagnostic applications and image-guided therapeutic interventions. She also has a practical interest in imaging informatics, with a focus on clinical workflow optimization and educational infrastructure.

    Dr. Chahine is actively involved in outreach, advocacy, and mentorship at both the institutional and local levels. She mentors undergraduate and medical students from diverse backgrounds and serves on the PRS Board. 

    She received her MD from the University of Balamand, Lebanon.

homza:
  sid: homza
  name: Jason Homza, MD
  img: img/homza.jpg
  bio: |
   Jason Homza, MD is a veteran of the US Marines, former teacher and now physician. Jason is a Staff Radiologist in Breast Imaging at Chestnut Hill Hospital/Temple Health. Dr. Homza completed his training in diagnostic radiology training at Penn in 2025, including a fourth-year embedded Breast Imaging Fellowship. Prior to Penn, Dr. Homza completed his medical training at Geisinger Commonwealth School of Medicine, in Scranton, PA. Before embarking on a career in medicine, Dr. Homza served as active duty in the United States Marines, including a deployment to Iraq in 2006 as part of the 2nd Battalion, 3rd Marines. Following his time in the marines, Jason became a teacher in a disadvantaged school district near his hometown of Scranton, PA. Jason holds many accolades including being a 2017 Tillman Scholar. Jason is a father of two and an avid golfer!

whorms:
  sid: whorms
  name: Debra Whorms, M.D.
  img: img/whorms.jpg
  bio: |
    My name is Debra Whorms, MD, and I am an Assistant Professor on the AC track in the Body Imaging Department, currently in my third year as an attending physician. I completed my medical school training at Harvard Medical School and my radiology residency at the University of Pennsylvania, where I also completed an embedded Body Imaging fellowship before joining the faculty immediately following residency. I became a parent during my first year as an attending and currently have a two-year-old child, an experience that has shaped my perspective on mentorship and work–life balance in early stages of faculty. In addition to my clinical and teaching responsibilities, I am interested in community and population health and have been active in mentorship and pipeline initiatives for high school students interested in health careers. From a population health standpoint, I am currently pursuing development of a population-based, informatics-driven initiative to improve the identification, communication, and downstream care of incidentally detected hepatic steatosis on imaging. 

jacob:
  sid: jacob
  name: Julia Jacob, M.D.
  img: img/jacob.jpg
  bio: |
    Julia Jacob, MD is an Assistant Professor of Clinical Radiology within the Division of Cardiothoracic Imaging at Penn Medicine. Prior to joining faculty at Penn in 2023, Dr. Jacob completed her diagnostic radiology residency and fellowship training at Mount Sinai. She earned her medical degree at the Lewis Katz School of Medicine at Temple University. Prior to medical school, Julia completed a double major in biology and English literature at the University of Rochester. Dr. Jacob serves as a QA officer within chest imaging.

chaudhary:
  sid: chaudhary
  name: Snehansh (Roy) Chaudhary, MBBS, MRCS, MSc, FRCR, FRCPC
  img: img/chaudhary.jpg
  bio: |
    Roy is a musculoskeletal radiologist, and his favorite bone is the hallux metatarsal medial sesamoid.

nazarian_m:
  sid: nazarian_m
  name: Matthew Nazarian, MD
  img: img/nazarian_m.jpg
  bio: |
    Dr. Matthew Nazarian is an Assistant Professor of Clinical Radiology within the Division of Abdominal Imaging at the Hospital of the University of Pennsylvania. Prior to joining faculty at Penn, Matt completed his medical school training at  Thomas Jefferson University Sidney Kimmel Medical College. He then completed diagnostic radiology residency training at NYU Langone Medical Center, followed by an abdominal imaging fellowship at Penn.

hathaway:
  sid: hathaway
  name: Quincy Hathaway, MD, PhD
  img: img/hathaway.jpg
  bio: |
    Quincy Hathaway is a Diagnostic Radiology resident physician (PGY-3) at the Hospital of the University of Pennsylvania. He completed his MD/PhD at West Virginia University. He has previously served on the Radiology AI Trainee Editorial Board and is currently a member of the ACR Commission on General, Small, Emergency and/or Rural Practices (GSER). His research areas include Molecular Biology, Computational Biology, Bioinformatics, Machine and Deep Learning Algorithms, and Opportunistic Imaging.

ataeinia:
  sid: ataeinia
  name: Bahar Ataeinia, MD, MPH
  img: img/ataeinia.png
  bio: |
    Bahar Ataeinia is a Diagnostic Radiology resident (PGY-3) at the Hospital of the University of Pennsylvania. She completed her MD MPH program at Tehran University of Medical Sciences, followed by a postdoctoral research fellowship at Massachusetts General Hospital focused on precision imaging and targeted therapies for cancer and autoimmune diseases. She has been actively involved in trainee-focused groups within national radiology societies, including serving on the Radiology: Imaging Cancer Trainee Editorial Board, the American Association for Women in Radiology (AAWR) Members-in-Training Committee with a focus on medical student outreach and membership, and as a Society of Advanced Body Imaging (SABI) Early Career Research Liaison.

dinglasan:
  sid: dinglasan
  name: Lu Anne V. Dinglasan, MD, MHS
  img: img/dinglasan.jpg
  bio: |
    Dr. Dinglasan is an Assistant Professor at the University of South Florida Morsani College of Medicine and at the University of Central Florida College of Medicine, and a full time breast/body/IR attending at the Bay Pines VA in sunny St. Petersberg, FL. She serendipitously discovered radiology as a medical student at Yale while taking a late 4th year elective to contemplate her surgery future after a particularly misogynistic away surgical rotation… and never looked back. While at Penn for radiology residency, Dr. Dinglasan’s love for education and teaching flourished under Mary Scanlon, and since the core of her interests always intersected with people, pictures, and patient care, specializing in IR and breast imaging was a natural fit (even though they are at two different ends of the radiology spectrum!). As she went pedal to the metal as a full-time radiologist in academia (week long trauma call, IR, ER coverage, breast, abstracts, posters, meetings, winning Educator of the Year and the only Outstanding Physician Award ever bestowed to a radiologist at the university) while simultaneously giving birth to three girls in three years… she discovered a mass that would change her life. Come along on the journey she took which eventually led her to the VA- where she is still a full-court press radiologist, clinician and educator but also has time to be a hard-core hands on mom, community volunteer, novice fencer, amateur pianist, foodie traveler, and most importantly expert chocolate chip cookie baker.

avey:
  sid: avey
  name: Gregory D. Avey, MD
  img: img/avey.jpg
  bio: |
    Dr. Gregory Avey is an Associate Professor of Radiology in the Divison of Neuroradiology at the University of Wisconsin School of Medicine. He is also the current Vice Chair for Clinical Operations at UW Madison. Dr. Avey completed his medical school training at the University of Washington, followed by diagnostic residency and fellwoship training at the Unviersity of Wisconsin. His research interests include advanced head and neck imaging techniques, both CT and MRI. He previously served as the Director of Fellowships at UW Madison. He is the recipient of a Dean's teaching award for his work on key elements of personal finance for graduating fourth-year medical students.

fried:
  sid: fried
  name: Jessica G. Fried, MD
  img: img/fried.jpg
  bio: |
    Dr. Fried is an assistant professor of abdominal imaging and cross-sectional interventional radiology at Michigan Medicine. She earned her medical degree at the Dartmouth Geisel School of Medicine, completed diagnostic radiology residency at the Hospital of the University of Pennsylvania, and abdominal imaging fellowship at University of Michigan. In addition to her clinical training, Dr. Fried completed an Imaging Informatics fellowship at the Hospital of the University of Pennsylvania. At Michigan Medicine Radiology, she serves as the Director of the Abdominal Imaging Fellowship and the Associate Medical Director of Radiology Informatics. Dr. Fried’s research focuses on imaging utilization management and natural language processing applications in radiology. Her focused clinical expertise is in percutaneous image-guided procedures, pancreas cancer, colorectal cancer, and advanced diagnostic imaging of the genitalia. Dr. Fried’s exemplary teaching has been recognized by the residents at University of Michigan, who awarded her with the Excellence in Teaching award for the Department in 2023, as well as excellent in teaching in the abdominal division for 2022 and 2024.

mankoff:
  sid: mankoff
  name: David Mankoff, MD, PhD
  img: img/mankoff.jpg
  bio: |
    Dr. David Mankoff is the Matthew J. Wilson Professor and Vice-Chair for Research. He also serves as the Associate Director for Education and Training for Penn’s Abramson Cancer Center (ACC). He is a graduate of Penn’s MSTP Program and holds a PhD in Bioengineering focusing on PET instrumentation. He practices Nuclear Medicine, with a special interest in oncologic applications of molecular imaging and radiopharmaceutical therapy. In addition to his role in education and training for the ACC, Dr. Mankoff and serves as mentor for Penn’s MSTP and MSTR programs. Dr. Mankoff’s research focuses on molecular imaging of cancer, primarily on breast cancer, and emphasizes molecular imaging biomarkers for precision oncology, therapeutic monitoring, and identifying biologic factors mediating therapeutic response and resistance. He also works on the translation of new methods into clinical trials and clinical practice and on methods for quantitative imaging and image analysis. Dr. Mankoff is an Komen Scholar for the Susan G. Komen Foundation and Co-Chairs the Radiologic Society of North America (RSNA) Research Vice-Chair Group. Dr. Mankoff is a past member and President of the American Board of Nuclear Medicine and is on the editorial boards of Nuclear Medicine and Biology, Breast Cancer Research, Journal of Nuclear Medicine, and Clinical Cancer Research and serves as an Associate Editor for the Journal of Nuclear Medicine and Deputy Editor for Breast Cancer Research.

kahn:
  sid: kahn
  name: Charles E. Kahn, Jr., MD, MS
  img: img/kahn.jpg
  bio: |
    Charles E. Kahn, Jr., MD, MS is Professor and Vice Chair of Radiology at the University of Pennsylvania; he served on the faculty of the University of Chicago and the Medical College of Wisconsin before moving to his current position at Penn. His clinical practice is in body CT and ultrasound. Professional interests include health services research, artificial intelligence, decision support, information standards, and knowledge representation. He has authored more than 160 scientific publications and 200 presentations. Dr. Kahn has given more than 190 invited lectures. He earned his MD at the University of Illinois, and completed radiology residency at the University of Chicago, where he served as chief resident. He earned an MS in Computer Sciences from UW-Madison in 2003.  He currently serves as Editor of Radiology: Artificial Intelligence.

sellmyer:
  sid: sellmyer
  name: Mark Sellmyer, MD, PhD
  img: img/sellmyer.jpg
  bio: |
    Mark was born and raised in Lincoln, Nebraska, where he developed a deep appreciation for corn-on-the-cob and a love of Husker football. After soaking in the sweetness of a college town in the midwest, Mark attended M.I.T. and majored in Chemistry (BS) with a concentration in Music. During his undergraduate degree, Mark joined Joe Jacobson's group called the Molecular Machines Lab in the M.I.T. Media Lab. The interdisciplinary nature of that environment, combining engineering with chemistry and biology, was inspiring and fostered the habit of doing experimental science at the same time as attempting to accomplish other things. That habit transformed into a full-blown MD/PhD in the Stanford MSTP program. At Stanford, Mark trained in chemical biology with Tom Wandless and found translational applications for new technologies using molecular imaging with Chris Contag. The natural combination of these fields are the foundation of his research today. Mark then came to the University of Pennsylvania as a research track radiology resident and completed a Nuclear Radiology fellowship. If he isn't in his office thinking “deep thoughts” or reading scans as a radiologist in the clinic, he's probably playing with his four kids, his wife, and their black lab in the backyard while growing and eating corn.

noel:
  sid: noel
  name: Peter B. Noël, M.S., Ph.D.
  img: img/noel.jpg
  bio: |
    Dr. Noël earned both his Bachelor’s and Master’s degrees in Biomedical Engineering from the University of Applied Sciences in Giessen, Germany. He later obtained a Master’s Degree in Computer Science while conducting research on interventional x-ray imaging at the Toshiba Stroke Research Center in Buffalo, NY. In 2009, he completed his Ph.D. in Computer Science at the State University of New York at Buffalo, focusing on advanced 3-D reconstruction algorithms for neuro-interventional applications. From 2009 to 2018, he served as a faculty member and the Director of CT Research at the Technical University of Munich. Currently, he is an Associate Professor of Radiology, Director of CT Research, and Co-Director of the Center for Advanced Computed Tomography Imaging Services (CACTIS) at the University of Pennsylvania.
    For over a decade, Dr. Noël has led a research program with a broad focus on developing x-ray and Computed Tomography (CT) technology. His research emphasizes the harmonization of hardware and software, reconstruction, and post-processing to achieve integrated clinical solutions. Dr. Noël has established a robust foundation for the clinical translation of novel diagnostic imaging technologies, such as the introduction of photon-counting CT. Another focus area is the development of novel 3D printed CT phantoms, which are essential for tasks related to accelerated clinical translation. On the other end of the spectrum, his research program addresses basic x-ray physics questions, focusing on phase-contrast and dark-field imaging.
    Dr. Noël's publication record includes over 190 peer-reviewed articles in international journals and more than 145 conference proceedings. Additionally, he holds a portfolio of patents in the fields of x-ray and CT imaging. He serves on the editorial boards of the IEEE Transactions in Medical Imaging and 3D Printing in Medicine. Furthermore, he is a standing member of an NIH study section.

pantel:
  sid: pantel
  name: Austin Pantel, MD, MSTR
  img: img/pantel.png
  bio: |
    Austin is an Assistant Professor of Radiology at Penn, as well as the Program Director of the Nuclear Radiology Fellowship. After completing the research track here, he completed an MSTR degree at Penn studying the human translation of novel radiotracers. Austin's current research focuses on translation of [18F]Fluoroglutamine and [18F]FluorThanatrace, as well the PennPET Explorer, a novel whole-body PET scanner. He is also involved in numerous other, smaller projects. Austin and his wife Lourdes (a cardiac anesthesiologist at Penn and his med school classmate) live in Philadelphia with little Lucy, their pride and a joy.  Lucy enjoys soup dumplings at Nan Xiang Xiao Long Bao in Cherry Hill, chicken fingers at Raising Cane's, and free samples at Costco.

cook:
  sid: cook
  name: Tessa Cook, MD, PhD, CIIP, FSIIM, FCPP
  img: img/cook.jpg
  bio: |
    Dr. Cook is an Associate Professor of Radiology at the Perelman School of Medicine at the University of Pennsylvania in Philadelphia, and Vice Chair of Practice Transformation in the Department of Radiology. She is an active member of multiple radiology societies, including the RSNA, ACR, SIIM, and AUR. She is the director of the Imaging Informatics Fellowship and Modality Chief of 3-D and Advanced Imaging. Dr. Cook is the Chair of the Society for Imaging Informatics in Medicine (SIIM). In 2020, she was inducted into the College of SIIM Fellows and received SIIM’s Dr. Ruth Dayhoff Award for the Advancement of Women in Medical Imaging Informatics. She pursues innovative methods to enhance care delivery in radiology and improve radiologists' workflow.

baer:
  sid: baer
  name: Anna V. Baer, MD, PhD
  img: img/baer.jpg
  bio: |
    Anna Baer, MD, PhD is an Assistant Professor of Radiology at Emory University and Pediatric Neuroradiologist at Children's Healthcare of Atlanta, where she also serves as a Director of Radiology Research.  Her main clinical and research interests include fetal and neonatal imaging, traumatic brain injury, and applications of advanced imaging techniques in pediatric neuroradiology. She is a former RSNA Olmsted Editorial Fellow and currently serves as an Associated Editor for Pediatric Neuroradiology section of AJNR. She is active in many committees within the ASNR, ASPNR, ASFNR, and RSNA.

jha:
  sid: jha
  name: Saurabh (Harry) Jha, MBBS MRCS MS
  img: img/jha.jpg
  bio: |
    Harry's interests lie at the intersection of law, economics, and AI. He obtained his medical degree from Guys Hospital, London,  completed radiology training at the University of Pennsylvania, and obtained a master's in health policy from the Leonard Davis Institute. He's a global radiology enthusiast who led an expedition to Everest Base Camp to deploy AI-enabled portable chest radiograph. 

eljack:
  sid: eljack
  name: Amr Kamal El Jack, MD, PhD
  img: img/eljack.jpg
  bio: |
    Amr El Jack was born in Sudan and grew up in Dakar, Senegal; Paris, France; Addis Ababa, Ethiopia; and Glendale, California. His father was an architect with UNESCO, leading to his family’s moves. He completed his undergraduate degree at California State University in Los Angeles and then moved to Boston University for MD/PhD training. His PhD work focused on insulin- regulated vesicle trafficking. He attended University of Pennsylvania for radiology residency and a fellowship in body MRI. He worked in private practice at Southeast Radiology for 11 years before returning to Penn and joining the abdominal imaging division in 2018. He is married with two children, Leila (14y) and Zein (11y), and a rambunctious German Shepherd, Jimmy (4y).

englander:
  sid: englander
  name: Brian S. Englander, MD
  img: img/englander.jpg
  bio: |
    Brian S. Englander, MD, is the Robert E. Campbell Professor of Clinical Radiology at the Perelman School of Medicine at the University of Pennsylvania and Chair of the Department of Radiology at Pennsylvania Hospital, Penn Medicine. A breast imaging and intervention specialist, he focuses on advancing health equity in cancer care. A 2018 Eisenhower Fellow (USA), he founded the Benek Global Health Project to build sustainable screening and diagnostic radiology programs worldwide. His work spans Mongolia, Rwanda, Vietnam, Liberia, and Israel, applying emerging technologies and mobile screening models to improve early detection and access to care, partnering with nonprofit organization, industry, and government collaborators.

arleo:
  sid: arleo
  name: Elizabeth Kagan Arleo, MD
  img: img/arleo.jpg
  bio: |
    Dr. Elizabeth Kagan Arleo is a board-certified radiologist specializing in breast and body imaging, a Professor of Radiology at Weill Cornell Medical College, an attending radiologist at NewYork-Presbyterian Hospital, and Editor-in-Chief of Clinical Imaging. A Yale graduate, she completed her radiology training and fellowship at NYPH/WCMC and joined the faculty in 2010. Her work spans clinical excellence, research in women’s imaging, and education, earning numerous honors including national educator and lifetime achievement awards. A leader in mentorship and gender equity, she founded the NYPH/WCMC Mentorship Program for Women in Radiology, served as President of the American Association for Women Radiologists, and held multiple leadership roles within the American College of Radiology. She views her greatest legacy as compassionate patient care and advocacy for improved family and parental leave in medicine.

gichoya:
  sid: gichoya
  name: Judy Wawira Gichoya, MD, MS
  img: img/gichoya.jpg
  bio: |
   Judy Wawira Gichoya, MD, MS, is an Associate Professor and interventional radiologist in the Department of Radiology and Imaging Sciences at Emory University School of Medicine, where she serves as co-director of the the Healthcare AI Innovation and Translational Informatics (HITI) Lab. Dr. Gichoya's research is focused on using data science to study health equity. Dr. Gichoya completed her diagnostic radiology training at the Indiana Unviersity School of Medicine, followed by fellowship training in vascular and interventional radiology at Oregon Health & Science University Hospital. Dr. Gichoya serves as associate editor and program director for the RSNA's Radiology: Artificial Intelligence Trainee Editorial Board and the fourth-year medical student machine learning elective. She has mentored over 60 students from around the world, including successful researchers, physician-scientists and industry professionals.

kundu:
  sid: kundu
  name: Shinjini Kundu, MD, PhD
  img: img/kundu.jpg
  bio: |
    Dr. Shinjini Kundu is an Assistant Professor of Radiology specializing in Neuroradiology at Washington University in St. Louis and Director of the Medical AI Research Lab. Her research develops explainable machine learning approaches for medical imaging, with a focus on discovering biological signatures of neurodegenerative disease. She is the creator of transport-based morphometry, a framework for mapping and interpreting disease-related variation in brain structure, and her work has been published in venues including PNAS, Science Advances, Nature Medicine, and Radiology: Artificial Intelligence. Dr. Kundu’s work bridges clinical neuroradiology and computational imaging, with the goal of enabling earlier detection and better staging of disorders such as Alzheimer’s and Parkinson’s disease. She also mentors trainees in research, career development, and building a purposeful academic path at the intersection of science, medicine, and leadership.

rodgers:
  sid: rodgers
  name: Shuchi K. Rodgers, MD
  img: img/rodgers.jpg
  bio: |
    Dr. Shuchi Rodgers is a Professor of Clinical Radiology at the Perelman School of Medicine at the University of Pennsylvania and the Chief of Abdominal Imaging in the Department of Radiology. A passionate educator, her research and education interests include OB-GYN imaging (infertility, first-trimester ultrasound, and endometriosis), hepatobiliary imaging (hepatic steatosis, hepatocellular cancer surveillance, gallbladder), and ultrasound.  Dr. Rodgers is a co-chair of the Liver Imaging and Reporting and Data Systems (LI-RADS) Surveillance US working group and a member of the LI-RADS Steering Committee. She is a fellow of the Society of Radiologists in Ultrasound (SRU) and participated in two recent SRU Consensus Panels. She recently co-chaired the SRU Consensus Panel on a Lexicon for First Trimester Ultrasound. Dr. Rodgers lives with her family in Philadelphia, Pennsylvania. She enjoys hiking, biking, Padel, and golf.

cha:
  sid: cha
  name: Soonmee Cha, MD
  img: img/cha.jpg
  bio: |
    Professor Soonmee Cha has served as the Vice Chair (since 2016) and Program Director of Diagnostic Radiology (since 2012) at the University of California San Francisco (UCSF) Medical Center and she is a neuroradiologist and a principle investigator in brain tumor imaging research. She obtained her MD degree from Georgetown University and completed her neuroradiology fellowship at New York University. Over the past two decades, Professor Cha has become nationally and internationally recognized as an outstanding clinician, with expertise in brain tumor imaging, and as a skillful leader in radiology education and training. As the Program Director of Diagnostic Radiology Residency overseeing 56 residents each year, she has led the UCSF Radiology Residency Program to the number one Doximty-ranked program in the United States for the past 12 consecutive years. She is considered one of the top educators and directors of radiology residency in the United States.

deng:
  sid: deng
  name: Francis Deng, MD
  img: img/deng.jpg
  bio: |
    Francis Deng, MD is Assistant Professor of Radiology and Radiological Science and Co-Director of Medical Student Diagnostic Radiology Electives at Johns Hopkins University. A graduate of Harvard College and Washington University in St. Louis School of Medicine, he completed his radiology residency and neuroradiology fellowship at Massachusetts General Hospital. Dr. Denghas received distinguished reviewer awards or served in editorial roles for Radiopaedia, Radiology, RadioGraphics, AJR, and JACR. He creates and amplifies educational content for an international audience through Radiopaedia, Medality (MRI Online), RadDiscord, social media accounts on X (@francisdeng, @headneckrads) and Bluesky (@francisdeng.bsky.social), and podcasts (AJR Podcast Series on Diagnostic Excellence and Error).

schnall:
  sid: schnall
  name: Mitchell Schnall, MD, PhD
  img: img/schnall.png
  bio: |
    Mitchell D. Schnall, MD, PhD, is the Senior Vice President for Data and Technology Solutions, Professor of Radiology and former Chair of the Radiology Department at the Perelman School of Medicine, University of Pennsylvania. Dr. Schnall is an international leader in translational biomedical and imaging research, working throughout his career across the interface between basic imaging science and clinical medicine to ensure effective integration of radiology research with other medical disciplines. His work has led to fundamental changes in the imaging approaches to breast and prostate cancer, and he continues to have a significant influence on emerging imaging technologies, including those in optical imaging. Dr. Schnall has played a critical role in efforts to organize cancer clinical and translational imaging research in the US. He has been the principal investigator of numerous team science initiatives. In 2008 he assumed the role of ACRIN Chair. Among the important trials ACRIN completed under his leadership is the landmark National Lung Cancer Screening trial that demonstrated the ability of low dose lung cancer screening to reduce lung cancer mortality by 20% in high risk patients. Dr. Schnall was one of the architects of the merger of ECOG and ACRIN to form the new ECOG-ACRIN Cancer Research Group, which he now co-Chairs. Dr. Schnall has been elected as a member of the American Society for Clinical Investigation, the Association of American Physicians and the Institute of Medicine of the National Academy of Sciences (now the National Academy of Medicine)

loevner:
  sid: loevner
  name: Laurie Loevner, MD
  img: img/loevner.jpg
  bio: |
    Laurie A. Loevner, MD, is the Chief of the Neuroradiology Division. Dr. Loevner joined the Penn faculty as an Assistant Professor in 1995. She rapidly ascended through the ranks to Professor of Radiology in 2005, and has joint appointments in Otorhinolaryngology: Head and Neck Surgery, Neurosurgery, and Ophthalmology at the University of Pennsylvania. Dr. Loevner reflects the tri-partite mission of clinical, educational and academic excellence. She was the recipient of the IS Ravdin Master Clinician Award in 2009 in recognition of her clinical expertise and compassionate delivery of care to patients. She has been recognized as a "top doc" in Philadelphia magazine and "best doctors" most years of her career. She was inducted into the Academy of Master clinicians at UPenn, and is now on their Board of Directors. Dr. Loevner is a highly respected local, national and international educator and lecturer, and is the recipient of numerous teaching awards. She has been invited to give over 500 lectures nationally and internationally. She is widely respected in the global Neuroradiology community for her expertise and leadership in the field, and has served as President of the American Society of Neuroradiology in 2015-2016, President of the American Society of Head and Neck Radiology in 2009-2010, and President of the Eastern Neuroradiological Society in 2001-2002. Dr. Loevner is currently the Co-Chair of the Foundation of the ASNR. She also chairs numerous committees for the ASNR and the RSNA. Dr. Loevner has made important scientific contributions to our understanding of the radiologic manifestations of head and neck cancer, as well as the role of imaging in determining surgical candidacy. She has published over 150 articles, numerous chapters, and she has authored five textbooks. She has also been a leader in the clinical translation of functional imaging biomarkers to predict and monitor the treatment response of head and neck cancer. She was the 2012 Recipient of the Prize of Innovation and Excellence from the Canadian Radiological Society for her body of research in head and neck MRI. Dr. Loevner has a focused interest in the academic mentoring of trainees and junior faculty, and in multidisciplinary collaboration. Her energy is directed toward continuing Penn’s legacy of national leadership in Neuroradiology.

elahi:
  sid: elahi
  name: Fatima Elahi, DO, MHA
  img: img/elahi.jpg
  bio: |
    Dr. Fatima Elahi completed her diagnostic radiology residency at the Hospital of the University of Pennsylvania in 2024, where she completed an embedded fellowship in Body Imaging. She graduated from Breast Imaging and Intervention fellowship at Mayo Clinic in Rochester, Minnesota and now practices as a radiologist at Henry Ford Health in Michigan.

    Dr. Elahi is immediate past Chair for the American College of Radiology Resident-Fellow Section (ACR-RFS), a board member for the ACRA Radiology Advocacy Network (RAN) and the Radiology Leadership Institute (RLI), and serves on the ACR Council Steering Committee (CSC). Dr. Elahi also serves as Chair of the Society of Breast Imaging (SBI) Resident and Fellow Section and was former President of the global radiology community RadDiscord in 2022-2023, now serving on the RadDiscord Board of Directors.

    Dr. Elahi was the recipient of the 2022 American Association for Women in Radiology Lucy Frank Squire Distinguished Resident Award in Diagnostic Radiology, the 2022 American College of Radiology Association RADPAC achievement award, and the 2024 recipient of the JACR Bruce J Hillman fellowship in scholarly publishing.

pogozelski:
  sid: pogozelski
  name: Andrea Pogozelski M.P.H., B.S., R.T., MR, CT
  img: img/pogozelski.jpg
  bio: |
    Andrea Pogezelski, a New Jersey native, loves the east coast lifestyle, with its captivating beaches and mountains. Her journey at Penn began in 2014 as the HUP MRI manager. In 2022, she transitioned to the role of HUP Assistant Director of Radiology in the Patient Safety and Quality division. With over 25 years in radiology, she has developed an in-depth understanding of all facets of the field, from technical aspects to management, through her role in quality leadership. Her experience spans various environments, including non-profit, for-profit, union, nonunion, acute care, and community-based care, with much of her time dedicated to direct patient care in CT & MRI.
    In her current role, Andrea continues to provide care, but at a higher level, now caring for clinical teams, managers, and radiologists. Her goal is to strengthen the HRO culture through constant quality monitoring and enhancing workflow within each radiology division. She collaborates with lean six sigma style task forces, focusing on common patient care goals. Her position involves raising awareness in healthcare process improvement initiatives, emphasizing the significant impact they have on patient care and treatment.

makhoul:
  sid: makhoul
  name: Peter Makhoul, MD
  img: img/makhoul.jpg
  bio: |
   Peter Makhoul is a PGY4 diagnostic radiology resident and is one of the chief residents for the 2025/2026 year. He is interested in global health and cardiothoracic and abdominal imaging. Outside the reading room, Peter likes to play sports and music and eat absurd amounts of ice cream.

ordonez:
  sid: ordonez
  name: Alvaro Ordonez, MD
  img: img/ordonez.jpeg
  bio: |
    Alvaro is a research-track diagnostic radiology resident at Penn. He trained at the Universidad Industrial de Santander in Colombia and spent time at Johns Hopkins before residency. When he’s not at the hospital or making mice radioactive in the lab, he’s usually traveling, running, taking random photos, attempting salsa in Old City, or keeping his plants alive (with mixed success).

hosseiny:
  sid: hosseiny
  name: Melina Hosseiny, MD
  img: img/hosseiny.jpeg
  bio: |
    Dr. Melina Hosseiny is a Clinician-Scientist Diagnostic Radiology resident at the University of California, Los Angeles (UCLA), where she is involved in numerous projects at the intersection of artificial intelligence and medical imaging. She serves as the principal investigator on a prestigious $50K RSNA Resident Grant award focused on deep learning models and oncologic imaging.

    Dr. Hosseiny has been honored with over 20 national and international awards, scholarships, and grants from renowned scientific meetings, including the AAWR Lucy Frank Squire Award, 2025 SABI Best Oral Presentation Award, 2024 ARRS President’s Award, 2024 SABI 3 Pearls First Place Award, 2023 RSNA Research Resident Award, 2023 Applied Radiology Award, NASCI 2023 Young Investigator Award, SABI 2023 Cum Laude Award, and the SAR 2019–2020 Research Scholarship Awards.

    She has authored more than 45 peer-reviewed publications and delivered over 50 scientific presentations at national and international conferences, with her work garnering approximately 2,000 scientific citations. Dr. Hosseiny stands out as one of the first radiology trainees to actively participate on the editorial boards of leading journals in the field, including Radiology: Artificial Intelligence, RadioGraphics and JACR. Her research interests lie at the intersection of deep learning and clinical radiology, with a focus on multimodal deep learning for diagnostic imaging tasks.

    Beyond her research endeavors, Dr. Hosseiny holds several leadership roles within the radiology community. She currently serves as Chair of the Society of Advanced Body Imaging Early Career Committee (SABI-ECC), Education Chair of the R4SF organization, and as a member of the LI-RADS Steering Committee and the SAR Emerging Technology Committee on Artificial Intelligence.

    Outside of medicine, she enjoys coding and software development, ziplining, practicing aerial yoga, skiing, and traveling. Dr. Hosseiny is passionate about enhancing medical imaging with AI and advancing medical education. She is driven by a personal mission to make a lasting, positive impact and to pave the way for future generations.

mattay:
  sid: mattay
  name: Raghav Ram Mattay, MD
  img: img/mattay.jpg
  bio: |
    Dr. Mattay earned his undergraduate degree with highest distinction in Cognitive Science at the University of Virginia. He then earned his medical degree from the Perelman School of Medicine at the University of Pennsylvania, where he completed the Clinical Neuroscientist Training Program and graduated at the top of his class culminating with his induction into the Alpha Omega Alpha Honor society. He subsequently completed his residency in Diagnostic Radiology at the Hospital of the University of Pennsylvania, where he founded the Radiology 200 course for Medical Students as well as co-founded the Business and Innovation in Radiology Track for residents. He went on to complete advanced fellowship training in Imaging Informatics as well as two years of Diagnostic Neuroradiology at Penn, where he served as Chief Fellow in his final year. He then pursued a two-year Neuroendovascular Surgery fellowship at the University of California San Francisco. He just completed his term as the Co-Chair of the Young Neurointerventionalist Surgery committee of the Society of Neurointerventional Surgery. He is currently an Assistant Professor of Neurosurgery at Lenox Hill Hospital in Manhattan, part of Northwell Health and Hofstra University School of Medicine.

solomon:
  sid: solomon
  name: Jeffrey Solomon, MD, MBA
  img: img/solomon.jpg
  bio: |
    Jeffrey is a clinical assistant professor of radiology in Penn's division of community radiology and a lecturer in the department of healthcare management at the Wharton school of business.  Jeffrey earned undergraduate degrees with honors from Brown University in Biology and Classics. He graduated from the University of Pennsylvania School of Medicine and was elected to the AOA honor society. He then completed a residency in diagnostic radiology and a fellowship in interventional radiology at the Hospital of the University of Pennsylvania. As part of his postgraduate training, he earned an MBA from the Wharton School of Business with a concentration in health care management.  He served as faculty in the division of Interventional Radiology at HUP from 2000 - 2011 when he moved to Silicon Valley as a founder of Infiniti Medical.  He has since served as chief medical officer of XACT Robotics and founded a second company before returning for his second tour of duty in clinical medicine at Penn.  As well as having sold his own company, Jeffrey has invested in several start ups that have been acquired by strategic partners.






burnes:
  sid: burnes
  name: Ted Burnes
  img: img/burnes.png
  bio: |
    Ted Burnes is Senior Director of Political Affairs and has run political operations for the American College of Radiology for the past 19 years. Under his leadership, Burnes has turned RADPAC from a half-a-million dollar a year political action committee (PAC) into a $1 million PAC. RADPAC consistently ranks among the top healthcare provider PACs in both contributions raised and contributions made. Burnes possesses a thorough knowledge of campaign finance law having worked for the Federal Election Commission and has more than 20 years of experience in fundraising and political consulting. He has worked both as a political pollster and consultant on numerous successful political campaigns at the local, state and federal levels, including high-profile Presidential campaigns. He has also lobbied Members of Congress and state legislators on numerous legislative issues, with a particular focus on health policy. Originally from the Philadelphia area, Burnes earned his B.A. in Government & Politics from George Mason University and received his masters degree in Public Administration with a concentration in government relations from The George Washington University. Burnes resides in Ashburn, VA, with his wife and two children.

wood:
  sid: wood
  name: Monica Wood, MD
  img: img/wood.jpg
  bio: |
    Monica Wood, MD, is a diagnostic radiologist at Schatzki Associates/Mount Auburn Hospital in Cambridge, MA. A dedicated clinician-educator, she serves as Assistant Program Director of the Mount Auburn Hospital Radiology Residency and as an Instructor in Radiology at Harvard Medical School. She also serves her colleagues as President-elect of the Mount Auburn Hospital Medical Staff.
    In addition to her local educational and administrative roles, Dr. Wood is deeply engaged in advocacy and health policy. She holds multiple leadership positions in organized medicine at both the state and national levels, including Immediate Past Chair of the American College of Radiology Young and Early Career Professional Section (ACR YPS), Vice President of the Massachusetts Radiological Society, Trustee of the Massachusetts Medical Society, and President of the Middlesex District Medical Society.
    Dr. Wood completed her medical education at Harvard Medical School and her residency and fellowship training at Massachusetts General Hospital, where she was selected as Chief Resident and later as Chief Neuroradiology Fellow. She resides in Cambridge, MA with her family.

dam:
  sid: dam
  name: Vincent Dam, MD
  img: img/dam.jpg
  bio: |
    Vincent Dam, MD, is a partner at Mecklenburg Radiology Associates in Charlotte, NC. He is a member of the Board of Directors and also serves on the recruitment committee. Dr. Dam is an alumnus of the University of Pennsylvania, where he completed his radiology residency in 2014, served as Chief Resident, and became the first graduate of the 16-month integrated Nuclear Radiology pathway. He remained at Penn for a two-year Neuroradiology Fellowship, and also served as Chief Fellow for both his Nuclear Medicine and Neuroradiology programs. Today, he maintains a dual-subspecialty practice in neuroradiology and nuclear radiology while providing strategic leadership for North Carolina's oldest independent private practice.

hunt:
  sid: hunt
  name: Stephen J. Hunt, MD, PhD, DABR
  img: img/hunt.jpg
  bio: |
    Dr. Stephen Hunt is the Co-Director of the Penn Image-Guided Interventions (PIGI) Laboratory and an Assistant Professor of Radiology at the Hospital of the University of Pennsylvania. He graduated medical school from the Stanford University School of Medicine, completed residency at the Hospital of the University of Pennsylvania and Kaiser Foundation Hospital, and completed fellowship at the Hospital of the University of Pennsylvania. He is Board certified in Interventional Radiology and Diagnostic Radiology. He received his PhD in Molecular & Cellular Physiology from Stanford University School of Medicine, and he received his MTR in Translational Therapeutics from the Perelman School of Medicine. He also conducts research in the follow fields: immuno-oncology, interventional oncology, cancer, cancer biology, immunotherapy, cell biology, cell physiology, animal models, translational research, vascular disease, health policy, health economics, GIS, artificial intelligence, ultrasound, AVUS, embolization, ablation, and the abscopal effect.

nadolski:
  sid: nadolski
  name: Gregory Nadolski, MD
  img: img/nadolski.jpg
  bio: |
    Dr. Nadolski received his medical degree from the Indiana University School of Medicine, where he graduated with highest honors and was the recipient of the Marcus Ravdin Award for highest academic achievement. He completed his post-graduate training in Radiology and Interventional Radiology at the University of Pennsylvania. During his residency, he co-founded the Penn Image Guided Interventions Laboratory. As faculty Dr. Nadolski completed a Master's in Translational Science Program at the University of Pennsylvania with a focus on clinical trial design and development of novel therapeutics. His research and clinical interests include multimodality therapies for the treatment of hepatocellular carcinoma and lymphatic leaks. He has started several investigator initiated clinical trials at the Hospital of the University of Pennsylvania for treating hepatocellular carcinoma and participated in or served as site PI for numerous federally funded and industry sponsored oncology trials.

_recht:
  sid: _recht
  name: Michael P. Recht, MD
  img: img/recht.png
  bio: |
    Michael Recht is the Louis Marx Professor and Chair of the Department of Radiology at NYU Langone Health. Dr. Recht attended Medical School at the University of Pennsylvania and completed a residency in Radiology at the Hospital of the University of Pennsylvania, where he was Chief Resident. He completed an interventional fellowship at the University of Pennsylvania, an MR fellowship at the University of Pittsburgh, an Osteoradiology fellowship at the University of California at San Diego and 10 months in the Siemens MR research division in Erlangen, Germany.
    His major research foci have been the imaging of articular cartilage, the development of rapid MR protocols for the musculoskeletal system using novel methods of image acquisition and reconstruction, including machine learning reconstruction and most recently, use of artificial intelligence, data analytics and informatics to optimize value and workflow within a radiology department. His commitment to research is exemplified by his previous service as Chairman, Research Committee, Society of Skeletal Radiology; Chairman, Program Committee for the International Skeletal Society; recipient of the President's Medal and Founders' Medal of the International Skeletal Society; and authorship of 170 publications, 9 book chapters and over 100 scientific abstracts. Dr. Recht has served as the President of the International Skeletal Society and the Society of Chairs of Academic Radiology Departments.
    Dr. Recht is also committed to developing new educational models, exemplified by his leadership of the development of an online radiology residency core curriculum, one of the founders of the National Imaging Informatics Curriculum and Course and most recently the development of an AI enabled precision education program for radiology residents. His combined interests in research, education and value have led to the funding of two NIH grants, "Discovering the Value of Imaging: A Collaborative Training Program in Biomedical Big Data and Comparative Effectiveness Research for the field of Radiology" and "Implementation and Evaluation of a Regional Image Share Network".

agrawal:
  sid: agrawal
  name: Gautam Agrawal, MD
  img: img/agrawal.jpg
  bio: |
    Gautam Agrawal is a serial entrepreneur who has started a number of companies in health-related market segments including his current teleradiology practice (as an R3). His technical background in Nuclear Engineering has served as a foundation for working at the intersection of health and technology. Gautam has been married for 24 years to an entrepreneurial wife. He has two children (17 year old daughter and 14 year old son) who he adores! Outside of medicine, Gautam is a coin & comic book collector as well as an avid gamer.

steyer:
  sid: steyer
  name: Benjamin Steyer, MD, PhD
  img: img/steyer.jpeg
  bio: |
    Benjamin Steyer, MD, PhD is a diagnostic radiologist at Aurora St. Luke's Medical Center in Milwaukee, WI. Dr. Steyer completed his post-graduate training in diagnostic radiology residency at the University of Pennsylvania, where he also completed the 16-month integrated Nuclear Radiology pathway. His doctoral research involved the development of genotype specific gene therapies for inherited retinal disease. His professional interests include application of technologies to facilitate development of precision medicine, and understanding the effect of regulatory policies on the affordability and incentive for innovation of novel therapeutic and diagnostic modalities. He received his MD and PhD in Molecular Biology at the University of Wisconsin, Madison.

joe:
  sid: joe
  name: Winston Joe, MD
  img: img/joe.jpeg
  bio: |
    Winston Joe, MD is a diagnostic radiologist at Radiology Imaging Associates in the Denver Metropolitan Area. Dr. Joe completed his post-graduate training in diagnostic radiology residency at the University of Pennsylvania, where he completed an embedded Breast Imaging Fellowship during his R4 year. Originally from Birmingham, Alabama, Winston completed his undergraduate studies at Stanford University before returning home to attend medical school at the University of Alabama at Birmingham (UAB). As a participant in the Health Equity Leadership Track and an associate scholar with the Penn Center for Global Health, Winston spent time working on projects in Botswana and Nepal with a focus on capacity building and point-of-care ultrasound outreach. In addition to his clinical work, he was also a Penn Imaging Informatics Fellow.

batlle:
  sid: batlle
  name: Juan Batlle, MD MBA
  img: img/batlle.jpg
  bio: |
    Dr. Batlle is a cardiothoracic and musculoskeletal radiologist with an unusual training and professional path since he started Penn Med in 1999. He spent a little extra time at Penn and collected two additional degrees -- an MBA and an M. Bioethics -- ostensibly out of curiosity rather than professional launch delay. After training at Mass General Hospital, he returned to his Miami hometown to serve Baptist Health South Florida, the largest health system in Miami-Dade, via its radiology group, Radiology Associates of South Florida (a RadPartners group). In Miami, he served as team radiologist for the Dolphins, Heat, Panthers, Inter Miami, and FIU, belonged to the cardiac imaging team performing more than 5000 coronary CTA per year, and developed the lung cancer screening program as well as the radiology pathways for the lung tumor team at the then-new Miami Cancer Institute. Along the way he has been active in publications and meeting presentations annually, on the SCCT as board member and committee chair, as well as at the ACR, where he serves as Florida Radiological Society President and Council Steering Committee member. In 2021 he took an unconventional professional course, moving his family to Boulder, Colorado, first as a day-work full-time partner for RASF and then eventually as a part-time employee for RASF and almost-full-time employee of Penn Medicine as a Clinical Associate Professor. He plays a lot of recreational Ultimate frisbee, enjoys crossword puzzles and word games, and spends family time with his wife Kathy, three screenagers, and a lab mutt named Poe.

cox:
  sid: cox
  name: Chad Cox, MD
  img: img/cox.jpg
  bio: |
    Chad Cox, MD is a radiologist.

wang:
  sid: wang
  name: Jing Wang, MD
  img: img/wang.jpg
  bio: |
    Jing Wang is a proud graduate of Penn Radiology residency, serving as a Qgenda Queen for the 2023-2024 academic year. She completed her training with a year-long breast minifellow and then a body fellowship. She has since joined Mainline Radiology in the Philly suburbs, splitting her time between the two subspecialities. Her favorite quadrants are upper outer and left upper, respectively.

duszak:
  sid: duszak
  name: Richard Duszak, MD
  img: img/duszak.jpg
  bio: |
    Richard Duszak, MD is Professor Emeritus at the University of Mississippi School of Medicine, having recently retired as Tenured Professor and Chair of the Department of Radiology. Past Council Speaker and current member of Board of Chancellors of the American College of Radiology, Dr. Duszak currently serves as Chief Medical Officer of the ACR's Radiology Leadership Institute.
    An outspoken supporter of evidence-based policy and longtime national leader in physician payment policy, Dr. Duszak previously served with CMS and private insurance leaders on the executive committee of the CPT Editorial Panel which maintains the code set by which all physician services are billed. Recognized for his expertise as an author, lecturer, and litigation consultant in healthcare fraud and abuse, Dr. Duszak is currently working on several initiatives to advance ethical and judicious use of artificial intelligence in radiology.
    Recognized by the Academy for Radiology and Biomedical Imaging Research with its Distinguished Investigator Award and the Association of University Radiologists with its Radiology Alliance for Health Services Research Achievement Award, Duszak has been honored as a fellow of the American College of Radiology, a fellow of the Society of Interventional Radiology, and as the first ever physician fellow of the Radiology Business Management Association. His scholarly pursuits focus largely on health policy (particularly imaging access and workforce, utilization, costs, and payment systems in radiology) and more recently data science and artificial intelligence. He has authored over 300 peer-reviewed publications and delivered over 600 invited lectures nationally in addition to serving on the editorial boards of several medical journals and a daily metropolitan newspaper. Over his career, he has helped secure over $9 million in research funding.
    A graduate of the Pennsylvania State University College of Medicine, Duszak completed his residency in diagnostic radiology at Duke University and his fellowship in vascular and interventional radiology at the University of Pennsylvania. Prior to his time at UMMC, he served as Professor and Vice Chair for Health Policy and Practice in the Department of Radiology and Imaging Sciences at Emory University after serving as Founding Chief Executive Officer of the Harvey L. Neiman Health Policy Institute. Prior to that, he spent nearly two decades in private practice, where he served as president of a large radiology group in his home state of Pennsylvania. He currently lives outside of Orlando, FL.

rudie:
  sid: rudie
  name: Jeff Rudie, MD PhD
  img: img/rudie.jpg
  bio: |
    Jeff Rudie, MD PhD, completed a Medical Scientist Training Program at UCLA with a PhD in neuroscience in 2012. He went to the Hospital of the University in Pennsylvania for a research track radiology residency and informatics fellowship. He was a HTBAR leader from 2017-2018. He then completed a two-year Neuroradiology fellowship at UCSF in 2021. He is currently a neuroradiologist at Scripps Clinic Medical Group in San Diego, where holds leadership positions within the operations committee of the radiology group and is leading efforts to evaluate AI solutions into for Scripps Health. He is also an Adjunct Assistant Professor of Radiology at University of California, San Diego. His research is focused on developing and translating artificial intelligence into clinical practice to improve the accuracy and efficiency of neuroradiology. In particular, he is involved research used deep-learning based segmentation methods for the longitudinal assessment in neuro-oncology, including diffuse gliomas and intracranial metastases. He also conducts research through radiology societies (RSNA and ASNR) and industry, including Cortechs.ai and Subtle Medical. He was the lead organizer of the 2024 International Brain Tumor Segmentation Challenge (BraTS) on post-treatment gliomas, a member of the RSNA AI committee and course director for the ASNR/ASFNR AI workshop.

weitzmangarcia:
  sid: weitzmangarcia
  name: Michelle Weitzman-Garcia, PhD
  img: img/weitzmangarcia.jpg
  bio: |
    Michelle is a senior-level executive consultant who has worked with over 150 medical executives over the last 15 years. Michelle's expertise lies in executive coaching and individual assessment work, all areas of talent management, leadership development programs, helping leaders build high performing teams, and organizational capability building and design. She tends to work with high potentials, deep experts such as MDs, PhDs and MD/PhDs, and women working in male-dominated groups. She takes a very inquisitive and direct approach to engaging each individual and takes a "meet them where they are approach" which allows her to engage without judgment. Her goals is to have people realize, for themselves, how they can do things differently and to help them build a new set of skills that will allow them to be successful not only in the current environment but in the future as well.
    Michelle has worked both independently as a consultant as well in large Fortune 500 organizations across a variety of industries. Prior to restarting her consulting practice, she spent 10 years working at Regeneron overseeing all talent management functions and serving as a coach to senior executive. She now specializes in working with physicians and others working in medicine and works across academia and industry. She has also worked with Chroma Medicine and Dispatch Bio both as a consultant and as a coach. She has won awards for her work in the talent management space and has been featured in Harvard Business Review for her work on performance management.
    Michelle received both her Master's and Ph.D. in Industrial/Organizational Psychology from the University of Akron. She has a BA in Psychology from Boston College.

armon:
  sid: armon
  name: Bruce Armon, JD
  img: img/armon.jpg
  bio: |
    Bruce Armon, JD counsels clients on how federal and state health care laws affect health care businesses. His understanding of corporate health care stems from a combination of his work with physicians, physician groups, hospitals, academic medical centers, ancillary providers, device manufacturers, veterinarians, health care entrepreneurs and insurers as well as his previous experiences in the Pennsylvania legislature and the health insurance industry. As chair of Saul Ewing's Health Care Practice, Bruce also brings insight on the leadership challenges his clients face from a day-to-day and long-range planning perspective.
    Bruce speaks often to physicians and health care audiences, and regularly writes and is quoted about health care issues in external publications. Bruce has vast experience drafting, editing and negotiating contracts for health care businesses. He also advises on payment and reimbursement issues, including those involving Medicare and Medicaid as well as private insurers. He also provides counseling on complying with fraud and abuse statutes, including those involving the federal anti-kickback statute and the federal Stark law and related state fraud and abuse laws. Bruce has experience advising clients on mergers and acquisitions in the health care industry, including academic medical centers, hospitals, medical practices, nursing homes and ASCs.

hawkins:
  sid: hawkins
  name: Matt Hawkins, MD
  img: img/hawkins.jpg
  bio: |
    Matt Hawkins is a board-certified interventional radiologist and professor at the Emory University School of Medicine within the Department of Radiology and Imaging Sciences. Dr. Hawkins is the Medical Director of pediatric interventional radiology, and specializes in the treatment of vascular malformations, pediatric renovascular hypertension, and venous thromboembolic disease. He also serves as Medical Director the Vascular Anomalies Clinic at Children's Healthcare of Atlanta. Dr. Hawkins' non-clinical interests include health policy, economics, and performance improvement - and specifically healthcare challenges where these disciplines intersect. Throughout his early career, he has actively volunteered for organized radiology and currently serves as the Health Policy and Economics Councilor for the Society of Interventional Radiology and as an assistant editor for the JACR. He has authored over 130 peer-reviewed publications, over 30 columns in radiology journals, and given over 220 national and international invited lectures. Dr. Hawkins attended medical school at Michigan State University College of Human Medicine (East Lansing, MI). He completed a residency in Diagnostic Radiology at the University of Cincinnati, followed by a Diagnostic Pediatric Radiology Fellowship at Cincinnati Children's Hospital Medical Center, and subsequent Vascular Interventional Radiology Fellowship at the University of Washington/Seattle Children's Hospital. He also completed a Master's in Business Administration at Emory University Goizueta Business School.

birnbaum:
  sid: birnbaum
  name: Julia Birnbaum, MD
  img: img/birnbaum.jpg
  bio: |
    Julia Birnbaum, MD is an Assistant Professor of Clinical Radiology and one of our stellar breast attendings. She is originally from Long Island and if you ask nicely might get her to slip into a true 'Noo Yawker' accent! She has lived in 7 states on both coasts and visited 41 states and Puerto Rico and counting. She did a fellowship in Women's Imaging at Penn in 1997 and never left. Julia has worked in both breast and ultrasound, but more recently been only in the breast department where she is an expert in ultrasound and image guided interventions.
    She once thought she wanted to do medical segments on news broadcasts and so spent some time working at KABC-TV in Los Angeles where she researched and produced medical segments. She also contributed to a medical documentary, book, and cookbook on high cholesterol.
    She is a mom of 4 (ages 18 to 38), a grandmom of 2 (3rd due anyday), and an owner of an 8 year old poodle. When not reading breast radiology, she can be found crocheting, reading psychological thrillers, listening to country music, or relaxing at the Jersey shore.

hiatt:
  sid: hiatt
  name: Kevin Hiatt, MD
  img: img/hiatt.jpg
  bio: |
    I grew up in North Carolina, went to Brigham Young University for undergrad, and then returned to North Carolina where I completed medical school, internship, radiology residency, and neuroradiology fellowship at Wake Forest School of Medicine. My wife and I have 4 kids, ages 6-11, and we spend a good chunk of our free time at soccer games and swim and gymnastics meets.

gade:
  sid: gade
  name: Terence P. Gade, MD, PhD
  img: img/gade.jpg
  bio: |
    Terence P. Gade, MD, PhD graduated from medical school at the New York-Presbyterian / Weill Cornell Medical Center. He completed residency at the Hospital of the University of Pennsylvania and Lankenau Hospital and fellowship at the Hospital of the University of Pennsylvania. He is a Co-Director of the Penn Image-Guided Interventions (PIGI) Laboratory, an Assistant Professor of Radiology, and an Assistant Professor of Cancer Biology at the University of Pennsylvania. He is board certified in Diagnostic Radiology. He also received his PhD in Biophysics from the Weill Graduate School of Medical Sciences of Cornell University and continues to conduct research. He is a member of the following: Academy of Radiology Research, American Association for Cancer Research, American Society of Clinical Oncology, Association of University Radiologists, National Institutes of Health, Radiological Society of North America, Society of Interventional Oncology, and Society of Interventional Radiology.

bennett:
  sid: bennett
  name: Brad Bennett, MD
  img: img/bennett.jpg
  bio: |
    Bradford Bennett, MD is a board-certified radiologist and the founder of Falcon Radiology, PLLC, an independent teleradiology practice. He completed his radiology residency at The Johns Hopkins Hospital and a neuroradiology fellowship at the Hospital of the University of Pennsylvania. After a year in private practice, he launched his own solo teleradiology company to gain greater flexibility, spend more time with his young family, and explore radiology-focused entrepreneurship. Dr. Bennett is passionate about improving radiologist workflow, promoting physician autonomy, and building sustainable, high-quality radiology practice models. He recently co-founded RadOverlay, LLC to address a workflow inefficiency common among teleradiologists.

roth:
  sid: roth
  name: Robyn Roth, MD
  img: img/roth.jpg
  bio: |
    Dr. Robyn Roth is an Assistant Professor of Breast and Abdominal Imaging at Cooper University Hospital where she serves as Women's Imaging Fellowship Director. She is a proud graduate of Penn Radiology Residency and Women's Imaging Fellowship. You probably know her as @theboobiedocs, her popular breast health social media platform.
    She hosts a podcast, "The Girlfriend's Guide to Breast Cancer" to help those navigating a breast cancer diagnosis or supporting a loved one. She is a frequent media contributor and author of her new children's book, Everyone Has Boobies.

gerson:
  sid: gerson
  name: Rachel Gerson, MD
  img: img/gerson.jpg
  bio: |
    Rachel Gerson, MD is a radiologist.

pryma:
  sid: pryma
  name: Dan Pryma, MD
  img: img/pryma.jpg
  bio: |
    Dan Pryma, MD is Vice President, Global Clinical Development at Eli Lilly & Co overseeing clinical development of the radioligand therapy portfolio. He is a nuclear medicine physician and was previously the Gerd Muehllehner Professor of Radiology and Chief of the Division of Nuclear Medicine Imaging and Therapy at the Perelman School of Medicine as well as the Associate Director for Clinical Research of the Abramson Cancer Center at the University of Pennsylvania.

adiletta:
  sid: adiletta
  name: Antonio Adiletta, MD
  img: img/adiletta.jpg
  bio: |
    Antonio Adiletta, MD is a radiologist.

desai:
  sid: desai
  name: Keyur Desai, M.D.
  img: img/desai.jpg
  bio: |
    Keyur Desai was a former attending at the University of Pennsylvania working in both the Body and MSK departments. He completed the University of Missouri Kansas City six year BA/MD program for undergrad/med school and an internship/transitional year in Flint, Michigan and then residency/fellowship in Philly at Penn. In his fourth year of residency, he completed 6-month mini fellowships in MSK and Neuroradiology. He completed an abdominal imaging fellowship at the University of Pennsylvania and currently works at Advocate Aurora in Milwaukee primarily as a Body attending.

hassankhani:
  sid: hassankhani
  name: Alvand Hassankhani, MD
  img: img/hassankhani.jpg
  bio: |
    Dr. Alvand Hassankhani is an Associate Professor of Clinical Radiology at the University of Pennsylvania, where he also serves as the Director of the Neuroradiology Network Practice Optimization Team. In this role, Dr. Hassankhani oversees initiatives to enhance operational efficiency and improve patient care at Penn Medicine -- University of Pennsylvania Health System. His efforts are particularly focused on optimizing clinical care delivery, and he is a founding member of the Spine Oncology Tumor Board which advances these goals.
    Dr. Hassankhani graduated with honors from Rutgers University, where he earned both his undergraduate and medical degrees. He completed his neuroradiology training at Duke University and Massachusetts General Hospital. After his training, he joined Brigham and Women's Hospital with an academic appointment at Harvard Medical School. With over 20 years of clinical experience across academic and private practice settings, Dr. Hassankhani has played pivotal roles, including serving as managing partner at Suffolk MRI, PC in Long Island, New York. There, he was instrumental in bringing the first high-field, state-of-the-art 3 Tesla MRI to the county, and led the practice to achieve the American College of Radiology (ACR) Center of Excellence designation.
    Since joining the University of Pennsylvania's neuroradiology division in 2019, Dr. Hassankhani has actively contributed to the training and education of radiology residents, and medical students, and mentoring neuroradiology fellows and junior faculty. His passion and commitment to excellence in patient care is matched by his dedication to education.
    Dr. Hassankhani is actively involved in numerous professional organizations. He has presented extensively at national and international conferences and has authored multiple peer-reviewed scientific publications. Currently, he holds senior editorial roles with the American Board of Radiology's Online Longitudinal Assessment (OLA) program and serves on the ACR Appropriateness Criteria Expert Panel in Neuroradiology. Dr. Hassankhani is a sought-after reviewer of many scientific journals. He is a member of the editorial board of the Journal of Clinical Imaging and has been appointed as the Assistant Editor of the prestigious American Journal of Roentgenology.
    Dr. Hassankhani is married to Dr. Jenny Bencardino, who is a world-renowned academic musculoskeletal radiologist, and is currently vice chair of radiology at Montefiore Medical Center.

witschey:
  sid: witschey
  name: Walter R. Witschey, PhD
  img: img/witschey.jpg
  bio: |
    Dr. Walter Witschey is an Associate Professor of Radiology and Director of the Advanced Cardiovascular Imaging Lab at the University of Pennsylvania. His research focus is theoretical and applied magnetic resonance imaging (MRI), machine learning and cardiovascular imaging. The Witschey lab uses a multidisciplinary and translational approach, integrating techniques from electrical engineering, computer science, biology and bioengineering. The group has contributed to MR physics and pulse sequence development (T1p and quantitative susceptibility mapping / QSM) and MR spectroscopy (1H downfield MRS), non-proton imaging and spectroscopy (23Na and 31P), machine learning and computer vision, and closed-loop systems for medical imaging. The Witschey lab focuses on basic science research in myocardial ischemia and coronary artery disease, reperfusion injury, non-ischemic heart disease, congenital heart disease and metabolic imaging of the heart. The lab develops machine learning algorithms for cardiac magnetic resonance, chest and hepatic and visceral computed tomography and MRI.

poff:
  sid: poff
  name: Jason Poff, MD
  img: img/poff.jpg
  bio: |
    Jason Poff fondly remembers his time at UPenn, where he finished training in 2013. After three years at Fairfax Radiological Consultants in Northern VA, he has been a private practice radiologist in Greensboro Radiology in Greensboro, NC since 2016, where he specializes in abdominal, thoracic and oncologic imaging and serves on the local practice board. For years at Greensboro and RP, Jason has explored the intersection of AI, radiologist workflow and quality improvement and has served as the director of innovation deployment at RP since April 2022.

goity:
  sid: goity
  name: Luis Goity, MD
  img: img/goity.jpg
  bio: |
    Luis Goity is an interventional radiologist at Mid-Atlantic Permanente Medical Group (MAPMG). He started at MAPMG in September of 2024 after completing his IR/DR integrated residency at Penn in the same year. He is a graduate of the University of Virginia School of Medicine (2018) and currently lives in Falls Church, Virginia with his wife, 3 year old daughter, and their dog.

strong:
  sid: strong
  name: Benjamin W. Strong, MD
  img: img/strong.jpg
  bio: |
    Ben Strong, MD is Chief Medical Officer of vRad. With a focus on maintaining and finding new ways to enhance our practice environment, Dr. Strong plays a critical role in advancing vRad's efforts, along with its radiologist and hospital partners, in expanding access, improving quality and reducing the total cost of care.
    Dr. Strong joined vRad as a teleradiologist in July 2004, and served as a medical director within vRad's practice from October 2005 to October 2012. Dr. Strong is board certified in both radiology and internal medicine. Prior to joining vRad, Dr. Strong worked as an emergency room physician for the IHS, as a private practice radiologist for Inland Imaging in Spokane, WA, and as a Clinical Assistant Professor of Radiology for the University of Arizona Health Sciences Center.
    Dr. Strong earned his medical degree from the University of Arizona College of Medicine, Tucson, completed his residency in internal medicine at Dartmouth-Hitchcock Medical Center, Lebanon, New Hampshire, and completed both a radiology residency and a fellowship in Musculoskeletal MRI at the University of Arizona, Arizona Health Sciences Center in Tucson. Dr. Strong is licensed to practice in all 50 U.S. states and holds credentials in a number of foreign countries.

