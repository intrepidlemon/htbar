allen:
  sid: allen
  name: Jason W. Allen, MD, PhD, FACR
  img: img/allen.jpg
  bio: |
    Jason W. Allen, MD, PhD, FACR is the Eugene C. Klatte Professor with tenure and Chair of the Department of Radiology and Imaging Sciences at the Indiana University School of Medicine. Dr. Allen obtained his MD and PhD in Neuroscience from Georgetown University School of Medicine and completed residencies in Neurology and Diagnostic Radiology as well as a two-year Neuroradiology fellowship at New York University School of Medicine. He previously was a partner at TRA Medical Imaging in Washington as well as a prior Professor at Emory University School of Medicine where he had several leadership roles, including the Neuroradiology Division Director, Medical Director of the Emory Center for Systems Imaging Core (CSIC), and Director of the Laboratory for Imaging Neuroscience at Emory (LINE). His primary research interests are characterizing the alterations in advanced neuroimaging metrics in the setting of neuronal injury, including stroke, traumatic brain injury, and neurodegenerative disorders, as well as the diagnosis and prognosis of cerebrovascular disease, such as subarachnoid hemorrhage, cerebrovascular reserve, and internal carotid webs. His laboratory is funded through several federal, private foundation, and institutional grants. He is also active in national organizations, particularly the American Society of Functional Neuroradiology (ASFNR) and the American Society of Neuroradiology (ASNR).
